name: Deploy Admin MECA — Produção

# meca-admin-nextjs é Next.js 15 App Router com output: 'export' (static).
# `npm run build` gera `out/` diretamente; o antigo `next export` foi removido
# do Next 14+. Deploy: S3 sync + CloudFront invalidate.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-admin-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: meca-admin-nextjs
  S3_BUCKET: meca-admin-prod
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.ADMIN_CLOUDFRONT_ID }}
  ADMIN_URL: https://admin.mecabr.com

jobs:
  # ── 1. Type check e build ────────────────────────────────────
  check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: |
          # Workaround npm#4828: lockfile gerado em macOS não inclui binários
          # nativos linux-x64 dos optional deps do Tailwind 4 (lightningcss,
          # @tailwindcss/oxide, etc). `npm ci` respeita o lockfile e omite
          # essas deps, causando "Cannot find native binding" no build.
          # Solução: descartar lockfile e deixar o npm resolver do zero em Linux.
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true  # TS pode ter erros pré-existentes

  # ── 2. Build e Deploy ────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: check
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: |
          # Workaround npm#4828: lockfile gerado em macOS não inclui binários
          # nativos linux-x64 dos optional deps do Tailwind 4 (lightningcss,
          # @tailwindcss/oxide, etc). `npm ci` respeita o lockfile e omite
          # essas deps, causando "Cannot find native binding" no build.
          # Solução: descartar lockfile e deixar o npm resolver do zero em Linux.
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-admin-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-admin-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.mecabr.com
          NODE_ENV: production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # `output: 'export'` já produz `out/` durante `next build`.
      - name: Verificar diretório out/
        run: |
          if [ ! -d "out" ]; then
            echo "ERRO: diretório out/ não existe após build. Verifique next.config.ts (output: 'export')."
            exit 1
          fi
          echo "out/ contém $(find out -type f | wc -l) arquivos"

      - name: Deploy para S3
        run: |
          # Assets com cache longo (imutáveis via hash no nome)
          aws s3 sync out/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.txt" \
            --region ${{ env.AWS_REGION }}

          # HTML/txt sem cache (roteamento SPA e next-data)
          aws s3 sync out/ s3://${{ env.S3_BUCKET }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.txt" \
            --region ${{ env.AWS_REGION }}

      - name: CloudFront invalidation
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Smoke test
        run: |
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 ${{ env.ADMIN_URL }} || echo "000")
          echo "Admin respondendo: HTTP $HTTP_STATUS"
          # Não falhar por smoke — admin pode ter auth redirect

      - name: Resumo
        if: always()
        run: |
          echo "## Admin Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bucket | s3://${{ env.S3_BUCKET }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hora | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
