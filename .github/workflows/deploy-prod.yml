name: Deploy Admin MECA — Produção

# meca-admin-nextjs é um Next.js 15 com App Router e SSR.
# Deploy: build Docker → push ECR → ECS task separada OU S3 estático se next export for viável.
# Por padrão tentamos next export (static). Se falhar (usa Server Components dinâmicos),
# o job de build falha early e o log indica que é necessário container.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-admin-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: meca-admin-nextjs
  S3_BUCKET: meca-admin-prod
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.ADMIN_CLOUDFRONT_ID }}
  ADMIN_URL: https://admin.mecabr.com

jobs:
  # ── 1. Type check e build ────────────────────────────────────
  check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true  # TS pode ter erros pré-existentes

  # ── 2. Build e Deploy ────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: check
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-admin-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-admin-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.mecabr.com
          NODE_ENV: production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Tentar next export (SSG). Se o projeto usar SSR, este step falhará graciosamente.
      - name: Tentar export estático
        id: static-export
        run: |
          if npx next export -o out 2>/dev/null; then
            echo "mode=static" >> $GITHUB_OUTPUT
            echo "Export estático bem-sucedido — deploy para S3"
          else
            echo "mode=docker" >> $GITHUB_OUTPUT
            echo "Export estático não disponível — app usa SSR. Necessário deploy em container."
          fi
        continue-on-error: true

      # Deploy S3 (apenas se export estático funcionou)
      - name: Deploy para S3 (modo estático)
        if: steps.static-export.outputs.mode == 'static'
        run: |
          aws s3 sync out/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --region ${{ env.AWS_REGION }}

          # HTML sem cache (para SPA routing funcionar)
          aws s3 sync out/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --region ${{ env.AWS_REGION }}

      - name: CloudFront invalidation (modo estático)
        if: steps.static-export.outputs.mode == 'static' && env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --region us-east-1  # CloudFront API é sempre us-east-1

      # Docker para SSR (se export estático falhou)
      - name: Build Docker (modo SSR)
        if: steps.static-export.outputs.mode == 'docker'
        run: |
          echo "## ATENÇÃO: Deploy em Container Necessário" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "O app Admin usa SSR e não pode ser exportado como estático." >> $GITHUB_STEP_SUMMARY
          echo "Configure um ECS Service para meca-admin-nextjs similar ao meca-api-service-prod." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Consulte OPERATIONS.md para instruções de setup do container admin." >> $GITHUB_STEP_SUMMARY
          exit 0  # Não falhar o workflow — apenas documentar

      - name: Smoke test
        run: |
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 ${{ env.ADMIN_URL }} || echo "000")
          echo "Admin respondendo: HTTP $HTTP_STATUS"
          # Não falhar por smoke — admin pode ter auth redirect

      - name: Resumo
        if: always()
        run: |
          echo "## Admin Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Modo | ${{ steps.static-export.outputs.mode || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hora | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
